[profile.default]
src = "src"
test = "ops/tests"
out = "out"
cache_path = "cache"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
bytecode_hash = "ipfs"
gas_reports = ["VolumeDynamicFeeHook"]
offline = true
# HookMiner.find() searches up to 160_444 salts; with large bytecode each keccak256 is ~7K gas.
# Worst-case: ~160_444 * 7_000 * 4 scenarios ≈ 4.5B gas in setUp. Set limit high enough.
gas_limit = "18446744073709551615"

broadcast = "broadcast"

# Keep remappings in remappings.txt for reproducibility.
auto_detect_remappings = false

# Needed for scripts that read environment variables and write deployment artifacts
fs_permissions = [
  { access = "read", path = "./" },
  { access = "read-write", path = "ops/local/out" },
  { access = "read-write", path = "ops/sepolia/out" },
  { access = "read-write", path = "ops/optimism/out" }
]

[profile.ops]
src = "src"
test = "ops/tests"
out = "out"
cache_path = "cache"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
bytecode_hash = "ipfs"
gas_reports = ["VolumeDynamicFeeHook"]
offline = true
broadcast = "broadcast"
auto_detect_remappings = false
gas_limit = "18446744073709551615"
fs_permissions = [
  { access = "read", path = "./" },
  { access = "read-write", path = "ops/local/out" },
  { access = "read-write", path = "ops/sepolia/out" },
  { access = "read-write", path = "ops/optimism/out" }
]

[fuzz]
runs = 256

[invariant]
runs = 128
depth = 64

[fmt]
line_length = 110

[lint]
lint_on_build = false
